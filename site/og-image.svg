<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#6A89A7"/>
  <!-- Graph nodes and edges -->
  <line x1="300" y1="250" x2="600" y2="150" stroke="#d8ebe5" stroke-width="3" opacity="0.4"/>
  <line x1="300" y1="250" x2="500" y2="400" stroke="#d8ebe5" stroke-width="3" opacity="0.4"/>
  <line x1="600" y1="150" x2="500" y2="400" stroke="#d8ebe5" stroke-width="3" opacity="0.4"/>
  <line x1="600" y1="150" x2="850" y2="200" stroke="#d8ebe5" stroke-width="3" opacity="0.4"/>
  <line x1="500" y1="400" x2="750" y2="450" stroke="#d8ebe5" stroke-width="3" opacity="0.4"/>
  <line x1="850" y1="200" x2="750" y2="450" stroke="#d8ebe5" stroke-width="3" opacity="0.4"/>
  <circle cx="300" cy="250" r="12" fill="#d8ebe5"/>
  <circle cx="600" cy="150" r="12" fill="#d8ebe5"/>
  <circle cx="500" cy="400" r="12" fill="#d8ebe5"/>
  <circle cx="850" cy="200" r="12" fill="#d8ebe5"/>
  <circle cx="750" cy="450" r="12" fill="#d8ebe5"/>
  <!-- Text -->
  <text x="600" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#ffffff">Open Knowledge Graphs</text>
  <text x="600" y="340" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#d8ebe5">Ontologies, vocabularies, taxonomies, and semantic software</text>
  <text x="600" y="380" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#d8ebe5" opacity="0.7">openknowledgegraphs.com</text>
</svg>
