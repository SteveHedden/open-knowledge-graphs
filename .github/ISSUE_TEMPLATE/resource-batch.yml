name: Resource batch (Wikidata-backed OKG additions)
description: Track a researched thematic batch of resources for implementation through Wikidata and OKG.
title: "[Resource batch] "
labels: ["resource-batch"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for one researched thematic batch (for example, agent memory and context
        graphs, KG construction, or SHACL validation). Follow
        `docs/adding-resources-through-wikidata.md`. Statuses are Candidate, In review, Approved,
        Included, and Rejected. Keep social-media work outside this issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What gap in the catalog is this batch closing? Why this theme, why now?
      placeholder: |
        The catalog is missing most core X standards. Y is currently the only genuine hit;
        everything else load-bearing in this space is absent.
    validations:
      required: true

  - type: textarea
    id: candidates
    attributes:
      label: Candidate table
      description: List every resource considered, including existing and rejected resources.
      value: |
        | Resource | Canonical URL | Status | Wikidata | Notes |
        |---|---|---|---|---|
        | | | Candidate | | |
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: Research and decisions
      description: Summarize identity resolution, existing coverage, evidence, ambiguities, and rejection reasons.
    validations:
      required: false

  - type: textarea
    id: implementation
    attributes:
      label: Implementation
      description: Remaining research, Wikidata changes, QIDs, and any OKG ingestion changes.
      value: |
        - [ ] Complete any remaining per-resource research
        - [ ] Review proposed Wikidata modeling and sources
        - [ ] Create or improve approved Wikidata items
        - [ ] Record QIDs and claim summaries in this issue
    validations:
      required: false

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Mark resources Included only after completing these checks.
      value: |
        - [ ] `scripts/fetch_data.py` run (or daily refresh confirmed) after edits landed on Wikidata
        - [ ] New/changed resources present in `data/ontologies.json` or `data/software.json`
        - [ ] Expected fields populated (website, license, category/software type)
        - [ ] Category/software-type classification is sane, not left unclassified
    validations:
      required: false

  - type: textarea
    id: closeout
    attributes:
      label: Closeout
      description: >
        Final technical summary before closing: QIDs created, classifications corrected,
        ingestion changes observed, exclusions, deferrals. Do not rewrite the issue's
        historical body — add this as the closing comment/section.
    validations:
      required: false
